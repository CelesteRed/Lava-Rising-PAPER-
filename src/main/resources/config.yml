configVersion: 9

logging:
  console: true

# The lobby is a dedicated, EMPTY void dimension (default key cr_lava:lobby), separate from the
# arena world. No platform is generated - build your own spawn in the dimension, stand on it, and
# run /lava setlobby. Players spawn here when they join while no round is running and after rounds.
# Until a spawn is set, players use the arena world spawn so nobody drops into the void.
# Namespaces must be lowercase [a-z0-9._-]; "CR_Lava" becomes "cr_lava".
lobby:
  world: lobby
  namespace: cr_lava
  # Spawn point inside the lobby dimension. Set with /lava setlobby (stand where you want it).
  configured: false
  x: 0.5
  y: 65.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0

start:
  minPlayers: 2
  publicStartWhenNoAdminOnline: true
  countdownSeconds: 10
  # When true, /lava start opens a gamemode vote; voteSeconds is how long it stays open.
  gamemodeVote: true
  voteSeconds: 15

round:
  world: world
  arenaDiameter: 100
  minSpawnY: 60
  startLavaY: -64
  maxLavaY: 319
  deathmatchStartY: 314
  pvpEnableY: 60
  # Difficulty follows PVP: peaceful while PVP is off, the combat difficulty once PVP turns on.
  countdownDifficulty: PEACEFUL
  surfaceDifficulty: EASY
  giveBlocks: true
  blockGiveRate: 16
  maxGivenBlocks: 256
  defaultBlock: DIRT
  sandMayhemBlock: SAND
  sandMayhemChance: 10
  villageStartChance: 10
  milestoneMessages: true
  sounds: true
  clearItemsOnLavaRise: false
  # Show a big on-screen title when each phase is reached (Y=0, Y=60, Y=100, BORDER CLOSING).
  phaseTitles: true
  # Seconds per lava block for each phase. Change in-game with /lava set round.phase.<1-5> <seconds>.
  # 1: start->Y0, 2: Y0->Y60, 3: Y60->Y100, 4: Y100->deathmatch, 5: deathmatch->top.
  phase:
    '1': 2.0
    '2': 2.0
    '3': 1.0
    '4': 1.0
    '5': 10.0

deathmatch:
  borderRadius: 1
  borderShrinkSeconds: 300
  borderDamage: true

celebration:
  seconds: 15
  fireworkIntervalTicks: 20
  minFireworks: 1
  maxFireworks: 3
  # Teleport everyone up to the lobby for the celebration instead of staying in the arena.
  lobbyCelebration: true

arenaSelection:
  minDistanceFromLobby: 512
  minDistanceFromUsedArenas: 512
  searchMinRadius: 700
  searchMaxRadius: 5000
  maxAttempts: 96
  treeCheckRadius: 32
  villageSearchRadiusChunks: 320
  villageSearchAttempts: 12
  # When true, arenas may only spawn in the biomes listed below. Set to false to accept
  # ANY biome (useful on a pre-generated world where the biomeWhitelist list is ignored).
  biomeWhitelistEnabled: true
  biomeWhitelist:
    - FOREST
    - BIRCH_FOREST
    - OLD_GROWTH_BIRCH_FOREST
    - FLOWER_FOREST
    - DARK_FOREST
    - PLAINS
    - SUNFLOWER_PLAINS
    - SAVANNA
    - SAVANNA_PLATEAU
    - TAIGA
    - OLD_GROWTH_PINE_TAIGA
    - OLD_GROWTH_SPRUCE_TAIGA
    - SPARSE_JUNGLE
    - JUNGLE
    - CHERRY_GROVE
    - MEADOW
    - WINDSWEPT_FOREST

performance:
  forceLoadArenaChunks: true
  forceLoadedChunkRadius: 4
  lavaChunksPerTick: 12
  fastLavaSpeedThreshold: 0.15
  fastLavaChunksPerTick: 256
  integrityChunksPerTick: 1
  integrityVerticalBatch: 24

buildLimits:
  enabled: true
  lockY: 160
  unlockWhenLavaY: 60
  warningY: 200
