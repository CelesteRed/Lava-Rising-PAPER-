name: LavaRising
version: 1.2.0
main: com.lavarising.plugin.LavaRisingPlugin
api-version: '1.20'
description: Fills the world with rising lava from bedrock to sky

commands:
  lavarising:
    description: Start, stop, or check status of the lava rising event
    usage: /lavarising <start|stop|status>
    permission: lavarising.use
  lavastart:
    description: Start the lava rising event (shorthand)
    usage: /lavastart
    permission: lavarising.use
  lavastop:
    description: Stop the lava rising event (shorthand)
    usage: /lavastop
    permission: lavarising.use
  reset:
    description: Manually end the current game and move everyone to a fresh area
    usage: /reset
    permission: lavarising.use

permissions:
  lavarising.use:
    description: Allows use of lava rising commands
    default: op
