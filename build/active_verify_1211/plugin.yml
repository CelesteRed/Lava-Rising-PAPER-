name: LavaRising
version: 1.2.11
main: com.lavarising.plugin.LavaRisingPlugin
api-version: '26.1.2'
description: Configurable lava rising arena with Y=319 height limit and phase 5 at Y=314

commands:
  lavarising:
    description: Start, stop, check status, or configure the lava rising event
    usage: /lavarising <start|stop|status|settings> or /lavarising settings <option> <value>
    permission: lavarising.use
  lavastart:
    description: Start the lava rising event (shorthand)
    usage: /lavastart
    permission: lavarising.use
  lavastop:
    description: Stop the lava rising event (shorthand)
    usage: /lavastop
    permission: lavarising.use
  reset:
    description: Manually end the current game and move everyone to a fresh area
    usage: /reset
    permission: lavarising.use

permissions:
  lavarising.use:
    description: Allows use of lava rising commands
    default: op
